on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

name: testthat

jobs:
  automatedTests:
    runs-on: ubuntu-latest

    container:
      image: rocker/tidyverse:4.4.2

    env:
      R_REPOS: "https://packagemanager.posit.co/cran/__linux__/jammy/latest"

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache: true
          extra-packages: 
            github::dfe-analytical-services/eesyscreener@v0.3.2
            any::testthat
            any::logger
            any::httr2
            any::mirai
            any::pingr
            any::withr
            any::stringi
            
      - name: Run tests
        shell: Rscript {0}
        run: |
          testthat::test_dir("tests/testthat/tests/function_handlers")
